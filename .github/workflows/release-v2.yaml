name: V2 Release

on:
  push:
    tags: ["v2.*.*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v5
        with:
          path: |
            .cache/tools/mihomo
            .cache/validation/mihomo
          key: ${{ runner.os }}-${{ runner.arch }}-mihomo-${{ hashFiles('tooling/mihomo.lock.json', 'config/runtime/*.yaml') }}
      - run: npm ci
      - run: npm run tools:setup
      - run: npm run check:v2
      - run: npm run build:publication
        env:
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
      - run: npm run verify:publication
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/v2/override.js
            dist/v2/rename.js
            dist/v2/example-full-config.yaml
            dist/v2/manifest.json
            dist/v2/checksums.txt
            dist/v2/rules.tar.gz
