name: CI

on:
  pull_request:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/cache@v6
        with:
          path: |
            .cache/tools/mihomo
            .cache/validation/mihomo
          key: ${{ runner.os }}-${{ runner.arch }}-mihomo-${{ hashFiles('tooling/mihomo.lock.json', 'config/runtime/*.yaml') }}

      - run: npm ci
      - run: npm run tools:setup
      - run: npm run check

  pages-artifact:
    if: github.event_name == 'push'
    needs: check
    uses: ./.github/workflows/pages.yaml

  pages-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: pages-artifact
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
