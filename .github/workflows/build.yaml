name: Build & Publish dist

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run verify

      - name: Deploy to dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: dist
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "build: 更新 dist 产物"
          force_orphan: true

      - name: Purge jsdelivr CDN cache
        run: |
          FAILED=0
          for file in $(find dist -type f | sed 's|^dist/||'); do
            if ! curl -sf --max-time 10 --retry 2 \
              "https://purge.jsdelivr.net/gh/${{ github.repository }}@dist/${file}" > /dev/null; then
              echo "WARN: 清理失败: $file"
              ((FAILED++))
            fi
          done
          echo "CDN 缓存清理完成（失败 $FAILED 个）"
