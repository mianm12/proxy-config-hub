name: Build & Publish dist

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run verify

      - name: Deploy to dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: dist
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "build: 更新 dist 产物"

      - name: Purge jsdelivr CDN cache
        run: |
          for file in $(find dist -type f | sed 's|^dist/||'); do
            curl -s "https://purge.jsdelivr.net/gh/mianm12/proxy-config-hub@dist/${file}" > /dev/null
          done
          echo "CDN cache purged for all dist files"
