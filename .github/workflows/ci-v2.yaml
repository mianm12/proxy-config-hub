name: V2 CI

on:
  pull_request:
  push:
    branches: [main, rewrite/v2]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/cache@v5
        with:
          path: |
            .cache/tools/mihomo
            .cache/validation/mihomo
          key: ${{ runner.os }}-${{ runner.arch }}-mihomo-${{ hashFiles('tooling/mihomo.lock.json', 'config/runtime/*.yaml') }}

      - run: npm ci
      - run: npm run tools:setup
      - run: npm run check:v2

  pages-dry-run:
    if: github.event_name == 'push' && github.ref == 'refs/heads/rewrite/v2'
    needs: check
    uses: ./.github/workflows/pages-v2-dry-run.yaml

  pages-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/rewrite/v2' && vars.ENABLE_V2_PAGES_DEPLOY == 'true'
    needs: pages-dry-run
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages-v2-staging
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Pages staging
        id: deployment
        uses: actions/deploy-pages@v4
