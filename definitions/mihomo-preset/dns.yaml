# DNS 配置
enable: true
listen: "127.0.0.1:5335"
use-system-hosts: false
use-hosts: true
ipv6: false
respect-rules: true
enhanced-mode: fake-ip
fake-ip-range: 198.18.0.1/16

# 引导解析器（纯 IP，用于解析 DoH/DoT 服务器域名）
default-nameserver:
  - 223.5.5.5#DIRECT
  - 119.29.29.29#DIRECT

# 国内 DNS（仅用于解析国内域名，使用加密 DNS）
nameserver:
  # 阿里 DNS
  - https://dns.alidns.com/dns-query
  # 腾讯 DNS
  - https://doh.pub/dns-query

# 代理节点域名解析
proxy-server-nameserver:
  # 阿里 DNS
  - https://dns.alidns.com/dns-query
  # 腾讯 DNS
  - https://doh.pub/dns-query

# 直连流量使用国内加密 DNS，且继续遵循策略
direct-nameserver:
  # 阿里 DNS
  - https://dns.alidns.com/dns-query
  # 腾讯 DNS
  - https://doh.pub/dns-query
direct-nameserver-follow-policy: true

# 国外 DNS（仅用于解析被污染的国外域名）
fallback:
  - https://cloudflare-dns.com/dns-query
  - https://dns.google/dns-query

# 回退过滤器（判断何时使用 fallback 解析）
fallback-filter:
  geoip: true
  geoip-code: CN
  ipcidr:
    - 240.0.0.0/4
    - 0.0.0.0/32
  domain:
    - "+.google.com"
    - "+.facebook.com"
    - "+.twitter.com"
    - "+.youtube.com"
    - "+.google.cn"
    - "+.googleapis.cn"
    - "+.googleapis.com"
    - "+.gvt1.com"

# 不使用 fake-ip 的域名（需要返回真实 IP）
fake-ip-filter:
  # 局域网与本机域名
  - "*.lan"
  - "*.local"
  - "localhost"
  # STUN
  - "stun.*.*.*"
  - "stun.*.*"
  # NTP / 时间同步
  - "time.*.com"
  - "ntp.*.com"
  - "time.nist.gov"
  - "time.asia.apple.com"
  - "*.ntp.org.cn"
  - "*.openwrt.pool.ntp.org"
  - "*.time.edu.cn"
  - "time1.cloud.tencent.com"
  - "time.ustc.edu.cn"
  - "pool.ntp.org"
  # QQ 快捷登录
  - "localhost.ptlogin2.qq.com"
  # 网络连通性检测
  - "*.msftconnecttest.com"
  - "*.msftncsi.com"
  - "+.market.xiaomi.com"
  # 音乐服务兼容
  - "+.music.163.com"
  - "*.126.net"
  # Steam CN
  - "+.steamchina.com"
  - "+.steamcontent.com"
  - "+.steamserver.net"
  - "csgo.wmsj.cn"
  - "dl.steam.clngaa.com"
  - "dl.steam.ksyna.com"
  - "dota2.wmsj.cn"
  - "st.dl.bscstorage.net"
  - "st.dl.eccdnx.com"
  - "st.dl.pinyuncloud.com"
  - "steampipe.steamcontent.tnkjmec.com"
  - "steampowered.com.8686c.com"
  - "steamstatic.com.8686c.com"
  - "wmsjsteam.com"
  - "xz.pphimalayanrt.com"
