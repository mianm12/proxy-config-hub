# 协议嗅探配置
enable: true
parse-pure-ip: true
force-dns-mapping: true
sniff:
  HTTP:
    ports:
      - 80
      - "8080-8880"
    override-destination: true
  QUIC:
    ports:
      - 443
      - 8443
  TLS:
    ports:
      - 443
      - 8443
override-destination: false
skip-domain:
  - "+.push.apple.com"
# Telegram 大量使用固定 IP / CIDR 直连，跳过嗅探可避免误判 SNI/Host。
# 这些流量后续应由 IP 类分流规则（如 RULE-SET/IP-CIDR/GEOIP）继续命中处理。
# 范围按官方列表整理，见 https://core.telegram.org/resources/cidr.txt
skip-dst-address:
  - 91.105.192.0/23
  - 91.108.4.0/22
  - 91.108.8.0/22
  - 91.108.12.0/22
  - 91.108.16.0/22
  - 91.108.20.0/22
  - 91.108.56.0/22
  - 149.154.160.0/20
  - 185.76.151.0/24
  - 2001:67c:4e8::/48
  - 2001:b28:f23c::/48
  - 2001:b28:f23d::/48
  - 2001:b28:f23f::/48
  - 2a0a:f280::/32
