# DNS 配置
enable: true
listen: "127.0.0.1:5335"
use-system-hosts: false
enhanced-mode: fake-ip
fake-ip-range: 198.18.0.1/16

# 引导解析器（纯 IP，用于解析 DoH/DoT 服务器域名）
default-nameserver:
  - 180.76.76.76
  - 182.254.118.118
  - 119.29.29.29
  - 223.5.5.5

# 国内 DNS（仅用于解析国内域名）
nameserver:
  - 180.76.76.76
  - 119.29.29.29
  - 180.184.1.1
  - 223.5.5.5
  - https://223.6.6.6/dns-query#h3=true
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query

# 国外 DNS（仅用于解析被污染的国外域名）
fallback:
  - https://000000.dns.nextdns.io/dns-query#h3=true
  - https://public.dns.iij.jp/dns-query
  - https://101.101.101.101/dns-query
  - https://208.67.220.220/dns-query
  - tls://8.8.4.4
  - tls://1.0.0.1:853
  - https://cloudflare-dns.com/dns-query
  - https://dns.google/dns-query

# 回退过滤器（判断何时使用 fallback 解析）
fallback-filter:
  geoip: true
  geoip-code: CN
  ipcidr:
    - 240.0.0.0/4
    - 0.0.0.0/32
    - 127.0.0.1/32
  domain:
    - "+.google.com"
    - "+.facebook.com"
    - "+.twitter.com"
    - "+.youtube.com"
    - "+.xn--ngstr-lra8j.com"
    - "+.google.cn"
    - "+.googleapis.cn"
    - "+.googleapis.com"
    - "+.gvt1.com"

# 不使用 fake-ip 的域名（需要返回真实 IP）
fake-ip-filter:
  # 局域网
  - "*.lan"
  # STUN
  - "stun.*.*.*"
  - "stun.*.*"
  # NTP 时间同步
  - time.windows.com
  - time.nist.gov
  - time.apple.com
  - time.asia.apple.com
  - "*.ntp.org.cn"
  - "*.openwrt.pool.ntp.org"
