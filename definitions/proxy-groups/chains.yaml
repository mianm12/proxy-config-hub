# 链式代理配置。默认空数组 = 不启用链式代理，输出与启用前完全一致。
#
# 启用示例：
#
# transit_group:
#   - id: transit
#     name: "🔀 中转"
#     transit_pattern: ""   # 空 = 所有非 landing 节点；非空则额外正则过滤
#     flags: i
#     type: select
#     include_direct: false # 可选，默认 false；是否包含直连节点作为中转候选项
#
# chain_group:
#   - id: chain
#     name: "🚪 落地"
#     landing_pattern: "自建|Relay|落地"
#     flags: i
#     entry: transit       # 引用 transit_group[].id
#     type: select

transit_group:
  - id: transit
    name: "🔀 中转"
    transit_pattern: "Transit|中转|自建" # 空 = 所有非 landing 节点；非空则额外正则过滤
    flags: i
    type: select
    include_direct: true # 可选，默认 false；是否包含直连节点作为中转候选项

chain_group:
  - id: landing
    name: "🚪 落地"
    landing_pattern: "Relay|落地|^(?=.*直连)(?=.*家宽)" # 必填；运行时按此正则捕获落地节点
    flags: i
    type: select
    entry: transit
