groupDefinitions:
  # proxies 支持以下动态占位符：
  # - "@all-nodes": 当前所有节点名
  # - "@region-groups": 运行时生成的地区分组名
  # - "@proxy-select" / "@manual-select" / "@auto-select": 引用已定义分组名
  #
  # 典型组合：
  # 1. 广告拦截: ["REJECT", "DIRECT"]
  # 2. 全节点组: ["@all-nodes"]
  # 3. 代理选择: ["@region-groups", "@manual-select", "@auto-select", "DIRECT"]
  # 4. 业务分组: ["@proxy-select", "@region-groups", "@manual-select", "@auto-select", "DIRECT"]
  # 核心规则组定义，只包含核心的国内外分流规则，其他规则组可以根据需要添加
  proxy_select:
    name: "🚀 代理选择"
    type: "select"
    category: "core"
    proxies:
      [
        "@manual-select",
        "@auto-select",
        "@chain-groups",
        "@region-groups",
        "DIRECT",
      ]
  manual_select:
    name: "🔧 手动选择"
    type: "select"
    category: "core"
    proxies: [ "@chain-groups", "@all-nodes" ]
  auto_select:
    name: "⚡ 自动选择"
    type: "url-test"
    category: "core"
    proxies: [ "@all-nodes" ]
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    lazy: false
  ad_block:
    name: "🛑 广告拦截"
    type: "select"
    category: "core"
    proxies: [ "REJECT", "DIRECT" ]
