# Sanitized example output for reference only.
# All node names, endpoints, and credentials below are placeholders.

mixed-port: 7897
allow-lan: true
mode: rule
log-level: info
unified-delay: true
tcp-concurrent: true
find-process-mode: strict

dns:
  enable: true
  listen: "127.0.0.1:5335"
  use-system-hosts: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 180.76.76.76
    - 182.254.118.118
    - 8.8.8.8
    - 180.184.2.2
  nameserver:
    - 180.76.76.76
    - 119.29.29.29
    - 180.184.1.1
    - 223.5.5.5
    - 8.8.8.8
    - https://223.6.6.6/dns-query#h3=true
    - https://dns.alidns.com/dns-query
    - https://cloudflare-dns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://000000.dns.nextdns.io/dns-query#h3=true
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - https://public.dns.iij.jp/dns-query
    - https://101.101.101.101/dns-query
    - https://208.67.220.220/dns-query
    - tls://8.8.4.4
    - tls://1.0.0.1:853
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
      - 127.0.0.1/32
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.twitter.com"
      - "+.youtube.com"
      - "+.xn--ngstr-lra8j.com"
      - "+.google.cn"
      - "+.googleapis.cn"
      - "+.googleapis.com"
      - "+.gvt1.com"
  fake-ip-filter:
    - "*.lan"
    - "stun.*.*.*"
    - "stun.*.*"
    - "time.windows.com"
    - "time.nist.gov"
    - "time.apple.com"
    - "time.asia.apple.com"
    - "*.ntp.org.cn"
    - "*.openwrt.pool.ntp.org"
    - "pool.ntp.org"
    - "ntp.ubuntu.com"
    - "ntp.aliyun.com"
    - "music.163.com"
    - "*.music.163.com"
    - "*.126.net"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"

profile:
  store-selected: true
  store-fake-ip: false

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    QUIC:
      ports:
        - 443
        - 8443
    TLS:
      ports:
        - 443
        - 8443

geodata-mode: true
geo-auto-update: true
geodata-loader: standard
geo-update-interval: 24
geox-url:
  geoip: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb
  asn: https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb

proxies:
  - name: "Sample-🇭🇰-Hong Kong-01"
    type: hysteria2
    server: hk-01.example.com
    port: 443
    password: example-password
    sni: www.example.com
    skip-cert-verify: true
    udp: true
  - name: "Sample-🇸🇬-Singapore-01"
    type: vless
    server: sg-01.example.com
    port: 443
    uuid: 00000000-0000-4000-8000-000000000001
    tls: true
    servername: www.example.com
    skip-cert-verify: true
    client-fingerprint: chrome
    network: tcp
    flow: xtls-rprx-vision
    udp: true
  - name: "Sample-🇯🇵-Japan-01"
    type: trojan
    server: jp-01.example.com
    port: 443
    password: example-password
    sni: www.example.com
    skip-cert-verify: true
    client-fingerprint: chrome
    network: tcp
    udp: true

proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "🇭🇰 香港节点"
      - "🇸🇬 新加坡节点"
      - "🇯🇵 日本节点"
      - DIRECT
  - name: "♻️ 自动选择"
    type: url-test
    interval: 300
    tolerance: 50
    url: http://www.gstatic.com/generate_204
    proxies:
      - "Sample-🇭🇰-Hong Kong-01"
      - "Sample-🇸🇬-Singapore-01"
      - "Sample-🇯🇵-Japan-01"
  - name: "🇭🇰 香港节点"
    type: select
    proxies:
      - "Sample-🇭🇰-Hong Kong-01"
  - name: "🇸🇬 新加坡节点"
    type: select
    proxies:
      - "Sample-🇸🇬-Singapore-01"
  - name: "🇯🇵 日本节点"
    type: select
    proxies:
      - "Sample-🇯🇵-Japan-01"
  - name: "📹 YouTube"
    type: select
    proxies:
      - "🚀 节点选择"
      - DIRECT
  - name: "🍎 Apple"
    type: select
    proxies:
      - DIRECT
      - "🚀 节点选择"
  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - "🚀 节点选择"
      - DIRECT

rule-providers:
  youtube:
    type: http
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.yaml
    path: ./ruleset/youtube.yaml
    interval: 86400
  apple:
    type: http
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple.yaml
    path: ./ruleset/apple.yaml
    interval: 86400
  private:
    type: http
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.yaml
    path: ./ruleset/private.yaml
    interval: 86400
  private-ip:
    type: http
    behavior: ipcidr
    format: yaml
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.yaml
    path: ./ruleset/private-ip.yaml
    interval: 86400

rules:
  - RULE-SET,youtube,📹 YouTube
  - RULE-SET,apple,🍎 Apple
  - RULE-SET,private,DIRECT
  - RULE-SET,private-ip,DIRECT,no-resolve
  - GEOIP,CN,DIRECT
  - MATCH,🐟 漏网之鱼
